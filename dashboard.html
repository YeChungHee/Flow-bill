<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>전자어음 할인 - 내 신청현황</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f0f2f5;color:#333;line-height:1.5}
.wrap{max-width:600px;margin:0 auto;padding:16px}
h1{text-align:center;color:#1565c0;font-size:1.3rem;padding:18px 0 6px}
.subtitle{text-align:center;color:#888;font-size:0.78rem;margin-bottom:6px}
.bar{height:3px;background:linear-gradient(90deg,#1565c0,#42a5f5);border-radius:2px;margin-bottom:20px}

/* 대시보드 요약 카드 */
.dash{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.dash-card{background:#fff;border-radius:12px;padding:14px;text-align:center;box-shadow:0 1px 5px rgba(0,0,0,0.06)}
.dash-card .num{font-size:1.6rem;font-weight:800;line-height:1.2}
.dash-card .label{font-size:0.72rem;color:#888;margin-top:2px}
.c-total{color:#1565c0}.c-prog{color:#e65100}.c-done{color:#2e7d32}

/* 신청 버튼 */
.btn-new{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:0.95rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#1565c0,#1e88e5);color:#fff;box-shadow:0 4px 12px rgba(21,101,192,0.3);margin-bottom:18px;transition:all 0.2s}
.btn-new:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(21,101,192,0.4)}

/* 리스트 */
.list-title{font-size:0.92rem;color:#555;font-weight:700;margin-bottom:10px;padding-left:4px}
.list-item{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,0.05);cursor:pointer;transition:all 0.15s}
.list-item:hover{box-shadow:0 3px 12px rgba(21,101,192,0.1);transform:translateY(-1px)}
.list-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.list-company{font-weight:700;color:#333;font-size:0.92rem}
.list-amount{font-weight:700;color:#1565c0;font-size:0.92rem}
.list-bottom{display:flex;justify-content:space-between;align-items:center}
.list-meta{color:#999;font-size:0.78rem}
.badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:0.72rem;font-weight:700}
.badge-wait{background:#fff3e0;color:#e65100}
.badge-select{background:#e3f2fd;color:#1565c0}
.badge-input{background:#f3e5f5;color:#7b1fa2}
.badge-endorse{background:#fff8e1;color:#f57f17}
.badge-done{background:#e8f5e9;color:#2e7d32}
.badge-cancel{background:#ffebee;color:#c62828}
.empty-msg{text-align:center;color:#bbb;padding:40px;font-size:0.88rem}
.footer{text-align:center;color:#bbb;font-size:0.72rem;padding:20px 0 30px}

/* 모달 */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:1000;justify-content:center;align-items:flex-start;padding:16px;overflow-y:auto}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:520px;max-height:none;margin:40px auto;box-shadow:0 8px 40px rgba(0,0,0,0.2)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px 14px;border-bottom:1px solid #eee}
.modal-header h2{font-size:1rem;color:#1565c0}
.modal-close{width:32px;height:32px;border:none;background:#f5f5f5;border-radius:50%;font-size:1.1rem;cursor:pointer;color:#888;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:#e0e0e0;color:#333}
.modal-body{padding:20px}

/* 정보 그리드 */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.info-item{background:#f8f9fa;border-radius:10px;padding:10px 12px}
.info-item .lbl{font-size:0.72rem;color:#888;font-weight:600;margin-bottom:2px}
.info-item .val{font-size:0.92rem;font-weight:700;color:#333}
.info-item .val.hl{color:#1565c0}
.info-full{grid-column:1/-1}
.divider{border:none;border-top:2px solid #e3f2fd;margin:8px 0 16px}

/* 할인 결과 패널 */
.result-panel{background:linear-gradient(135deg,#e8eaf6,#e3f2fd);border-radius:14px;padding:16px;margin-bottom:16px}
.result-panel h3{font-size:0.88rem;color:#1565c0;margin-bottom:12px}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(0,0,0,0.05)}
.result-row:last-child{border-bottom:none}
.result-lbl{font-size:0.82rem;color:#666}
.result-val{font-size:0.95rem;font-weight:700;color:#1565c0}
.result-val.fee{color:#e65100}
.result-val.net{color:#2e7d32;font-size:1.05rem}

/* 분할배서 패널 */
.split-panel{background:#fff8e1;border-radius:12px;padding:14px;margin-bottom:16px;border:1.5px solid #ffe082}
.split-panel h4{font-size:0.82rem;color:#f57f17;margin-bottom:8px}
.split-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:0.85rem}
.split-row .sn{color:#888;font-size:0.78rem;width:40px}
.split-row .sa{font-weight:700;color:#333}

/* 입력 폼 영역 */
.form-section{background:#f8f9fa;border-radius:14px;padding:18px;margin-bottom:16px}
.form-section h3{font-size:0.88rem;color:#1565c0;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:0.78rem;color:#666;font-weight:600;margin-bottom:4px}
.field input,.field select{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:10px;font-size:0.92rem;outline:none;background:#fff;transition:border 0.2s}
.field input:focus{border-color:#1565c0;box-shadow:0 0 0 3px rgba(21,101,192,0.08)}
.field input[readonly]{background:#f0f0f0;color:#555}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* 첨부파일 */
.file-area{border:2px dashed #ccc;border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:border 0.2s;margin-top:4px}
.file-area:hover{border-color:#1565c0;background:#f8f9ff}
.file-area .icon{font-size:1.5rem;margin-bottom:4px}
.file-area .text{font-size:0.78rem;color:#888}
.file-name{font-size:0.82rem;color:#1565c0;font-weight:600;margin-top:6px}
.file-input{display:none}

/* 배서 계좌 정보 */
.endorse-panel{background:linear-gradient(135deg,#e8f5e9,#f1f8e9);border-radius:14px;padding:16px;margin-bottom:16px;border:1.5px solid #c8e6c9}
.endorse-panel h3{font-size:0.88rem;color:#2e7d32;margin-bottom:10px}
.endorse-row{display:flex;justify-content:space-between;padding:6px 0;font-size:0.85rem;border-bottom:1px solid rgba(0,0,0,0.04)}
.endorse-row:last-child{border-bottom:none}
.endorse-lbl{color:#666;font-size:0.8rem}
.endorse-val{font-weight:700;color:#333}

/* 입금 정보 */
.deposit-panel{background:linear-gradient(135deg,#e3f2fd,#bbdefb);border-radius:14px;padding:16px;margin-bottom:16px;border:1.5px solid #90caf9}
.deposit-panel h3{font-size:0.88rem;color:#1565c0;margin-bottom:8px}
.deposit-date{font-size:1.1rem;font-weight:800;color:#1565c0;text-align:center;padding:8px 0}

/* 상태 진행바 */
.progress-bar{display:flex;gap:4px;margin-bottom:18px;padding:0 4px}
.step{flex:1;text-align:center;padding:8px 0;border-radius:8px;font-size:0.72rem;font-weight:700;background:#f0f0f0;color:#bbb;transition:all 0.3s}
.step.active{background:#1565c0;color:#fff}
.step.done{background:#e8f5e9;color:#2e7d32}
.step.cancel{background:#ffebee;color:#c62828}

/* 버튼 */
.btn-row{display:flex;gap:10px;margin-top:16px}
.btn{flex:1;padding:13px;border:none;border-radius:10px;font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-primary{background:linear-gradient(135deg,#1565c0,#1e88e5);color:#fff;box-shadow:0 4px 12px rgba(21,101,192,0.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(21,101,192,0.4)}
.btn-danger{background:linear-gradient(135deg,#c62828,#e53935);color:#fff;box-shadow:0 4px 12px rgba(198,40,40,0.3)}
.btn-danger:hover{transform:translateY(-1px)}
.btn-success{background:linear-gradient(135deg,#2e7d32,#43a047);color:#fff;box-shadow:0 4px 12px rgba(46,125,50,0.3)}
.btn-success:hover{transform:translateY(-1px)}
.btn-secondary{background:#f5f5f5;color:#666}
.btn-secondary:hover{background:#e0e0e0;color:#333}
.btn-warn{background:linear-gradient(135deg,#f57f17,#ffa000);color:#fff;box-shadow:0 4px 12px rgba(245,127,23,0.3)}
.btn-warn:hover{transform:translateY(-1px)}

/* 토스트 */
.msg-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:10px;font-size:0.88rem;font-weight:600;color:#fff;z-index:2000;display:none}
.msg-ok{background:#2e7d32}.msg-err{background:#c62828}

/* 사업자번호 진입 화면 */
.login-card{background:#fff;border-radius:14px;padding:28px 20px;margin-top:10px;box-shadow:0 2px 12px rgba(0,0,0,0.08);text-align:center}
.login-title{font-size:1rem;color:#1565c0;margin-bottom:6px}
.login-desc{font-size:0.82rem;color:#888;margin-bottom:20px}
.login-card .field{text-align:left;margin-bottom:16px}
.login-card .field input{text-align:center;font-size:1.1rem;font-weight:700;letter-spacing:1px}
.login-msg{margin-top:12px;font-size:0.82rem;color:#c62828;min-height:20px}
.login-info{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:14px;padding:8px 14px;background:#e3f2fd;border-radius:8px;font-size:0.82rem;color:#1565c0;font-weight:600}
.nav-tabs{display:flex;gap:0;margin-bottom:18px;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.nav-tab{flex:1;text-align:center;padding:11px 0;font-size:0.85rem;font-weight:700;text-decoration:none;color:#888;transition:all 0.2s;border-bottom:2.5px solid transparent}
.nav-tab:hover{color:#1565c0;background:#f8f9ff}
.nav-tab.active{color:#1565c0;border-bottom-color:#1565c0;background:#e3f2fd}

/* 수정 모달 */
.edit-section{background:#fff3e0;border-radius:14px;padding:18px;margin-bottom:16px;border:1.5px solid #ffe0b2}
.edit-section h3{font-size:0.88rem;color:#e65100;margin-bottom:14px}

/* === 반응형 === */
/* 데스크톱 (768px+) */
@media(min-width:768px){
  .wrap{max-width:720px;padding:24px}
  h1{font-size:1.5rem;padding:24px 0 8px}
  .dash{gap:14px}
  .dash-card{padding:18px}
  .dash-card .num{font-size:1.8rem}
  .nav-tabs{margin-bottom:24px}
  .nav-tab{padding:13px 0;font-size:0.9rem}
  .list-item{padding:16px 18px}
  .modal{max-width:600px}
  .modal-body{padding:24px}
  .login-card{padding:36px 28px;max-width:440px;margin:20px auto}
}
/* 소형 모바일 (380px 이하) */
@media(max-width:380px){
  .wrap{padding:10px}
  h1{font-size:1.1rem;padding:12px 0 4px}
  .subtitle{font-size:0.72rem}
  .dash{grid-template-columns:repeat(3,1fr);gap:6px}
  .dash-card{padding:10px 6px}
  .dash-card .num{font-size:1.2rem}
  .dash-card .label{font-size:0.65rem}
  .nav-tab{padding:9px 0;font-size:0.8rem}
  .list-item{padding:12px;border-radius:10px}
  .list-company{font-size:0.85rem}
  .list-amount{font-size:0.85rem}
  .modal{margin:10px auto;border-radius:12px}
  .modal-body{padding:14px}
  .modal-header{padding:14px 16px 10px}
  .info-grid{grid-template-columns:1fr;gap:6px}
  .info-item{padding:8px 10px}
  .result-panel{padding:12px}
  .split-panel{padding:10px}
  .endorse-panel{padding:12px}
  .form-section{padding:14px}
  .row2{grid-template-columns:1fr}
  .btn-row{flex-direction:column;gap:8px}
  .btn-row .btn{min-width:auto}
  .login-card{padding:20px 16px}
  .login-card .field input{font-size:1rem}
  .edit-section{padding:14px}
}
</style>
</head>
<body>
<div class="wrap">

  <!-- ===== 사업자번호 진입 화면 ===== -->
  <div id="loginScreen">
    <h1>내 신청현황</h1>
    <p class="subtitle">전자어음 할인 문의 · 신청자 대시보드</p>
    <div class="bar"></div>
    <div class="nav-tabs">
      <a class="nav-tab" href="inquiry.html">할인 문의</a>
      <a class="nav-tab active" href="dashboard.html">내 신청현황</a>
    </div>
    <div class="login-card">
      <h2 class="login-title">사업자번호로 조회</h2>
      <p class="login-desc">할인 문의 시 입력한 사업자번호를 입력해 주세요.</p>
      <div class="field">
        <label>사업자번호</label>
        <input type="text" id="loginBiz" placeholder="사업자번호 10자리 입력" inputmode="numeric" maxlength="10" oninput="this.value=this.value.replace(/[^0-9]/g,'')" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn-new" onclick="doLogin()" id="btnLogin">조회하기</button>
      <div class="login-msg" id="loginMsg"></div>
    </div>
    <div class="footer">276홀딩스 · 전자어음 할인 시스템</div>
  </div>

  <!-- ===== 대시보드 (초기 숨김) ===== -->
  <div id="dashScreen" style="display:none">
    <h1>내 신청현황</h1>
    <p class="subtitle">전자어음 할인 문의 · 신청자 대시보드</p>
    <div class="bar"></div>
    <div class="nav-tabs">
      <a class="nav-tab" href="inquiry.html">할인 문의</a>
      <a class="nav-tab active" href="dashboard.html">내 신청현황</a>
    </div>
    <div class="login-info" id="loginInfo"></div>

    <!-- 대시보드 -->
    <div class="dash">
      <div class="dash-card"><div class="num c-total" id="dTotal">0</div><div class="label">전체 신청</div></div>
      <div class="dash-card"><div class="num c-prog" id="dProg">0</div><div class="label">진행중</div></div>
      <div class="dash-card"><div class="num c-done" id="dDone">0</div><div class="label">완료</div></div>
    </div>

    <div class="list-title">신청 이력</div>
    <div id="listBody"></div>

    <div style="text-align:center;margin-top:16px"><a href="#" onclick="doLogout();return false" style="color:#999;font-size:0.78rem;text-decoration:underline">다른 사업자번호로 조회</a></div>
    <div class="footer">276홀딩스 · 전자어음 할인 시스템</div>
  </div>

</div>

<!-- 상세 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">상세 정보</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="msg-toast" id="toast"></div>

<script>
// ===== Config =====
var API_URL = 'https://script.google.com/macros/s/AKfycbxLTGdKtQuX4hAG-rKuPDuuMoRB47uF-e4-PinBuAsyCc7MhxG-P1RUA1077N51kquxQw/exec';

// 배서 계좌 정보 (고정)
var ENDORSE_INFO = {
  bank: '우리은행',
  account: '1002-631-832129',
  holder: '개인사업자 : (플로우렌트) 신인근',
  idNo: '880708-1'
};

// ===== Utility =====
function $(id){return document.getElementById(id)}
function fmt(n){return n?Number(n).toLocaleString('ko-KR'):'0'}
function parseNum(s){return parseInt(String(s).replace(/[^0-9]/g,''))||0}
function daysBetween(a,b){return Math.ceil((new Date(b)-new Date(a))/(1000*60*60*24))}

// 공휴일 DB
var KR_HOLIDAYS={
  2024:['01-01','02-09','02-10','02-11','02-12','03-01','04-10','05-01','05-06','05-15','06-06','08-15','09-16','09-17','09-18','10-03','10-09','12-25'],
  2025:['01-01','01-28','01-29','01-30','03-01','03-03','05-01','05-05','05-06','06-06','08-15','10-03','10-05','10-06','10-07','10-08','10-09','12-25'],
  2026:['01-01','02-16','02-17','02-18','03-01','03-02','05-01','05-05','05-24','05-25','06-06','06-08','08-15','08-17','10-03','10-04','10-05','10-06','10-07','10-08','10-09','12-25'],
  2027:['01-01','02-06','02-07','02-08','02-09','02-10','03-01','05-01','05-05','05-13','06-06','06-07','08-15','08-16','09-23','09-24','09-25','09-27','10-03','10-04','10-09','10-11','12-25','12-27']
};
function isHoliday(d){var y=d.getFullYear(),mm=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return KR_HOLIDAYS[y]&&KR_HOLIDAYS[y].indexOf(mm+'-'+dd)!==-1;}
function isBusinessDay(d){var dow=d.getDay();if(dow===0||dow===6)return false;return !isHoliday(d);}
function nextBusinessDay(ds){var d=new Date(ds);while(!isBusinessDay(d))d.setDate(d.getDate()+1);return d;}
function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function calcDiscount(amount,rate,days){return Math.round(amount*(rate/100)/30*days)+1500;}

// ===== Global State =====
var allBills = [];
var currentBiz = ''; // 현재 로그인된 사업자번호

// ===== 로그인/로그아웃 =====
function doLogin(){
  var biz = $('loginBiz').value.trim().replace(/[^0-9]/g,'');
  if(biz.length !== 10){
    $('loginMsg').textContent = '사업자번호 10자리를 입력해 주세요.';
    return;
  }
  $('loginMsg').textContent = '';
  $('btnLogin').disabled = true;
  $('btnLogin').textContent = '조회 중...';
  currentBiz = biz;
  loadAll().then(function(){
    if(allBills.length === 0){
      $('loginMsg').textContent = '해당 사업자번호로 등록된 신청 내역이 없습니다.';
      $('btnLogin').disabled = false;
      $('btnLogin').textContent = '조회하기';
      return;
    }
    $('loginScreen').style.display = 'none';
    $('dashScreen').style.display = 'block';
    $('loginInfo').innerHTML = '사업자번호: <strong>'+currentBiz+'</strong>';
    renderDashboard();
    renderList();
  });
}

function doLogout(){
  currentBiz = '';
  allBills = [];
  $('dashScreen').style.display = 'none';
  $('loginScreen').style.display = 'block';
  $('loginBiz').value = '';
  $('btnLogin').disabled = false;
  $('btnLogin').textContent = '조회하기';
}

// ===== API Helper =====
function updateBillAPI(payload){
  return fetch(API_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(payload),
    redirect:'follow'
  }).then(function(r){return r.text()}).catch(function(e){console.error('API error:',e)});
}

// ===== Load All (async, 사업자번호 필터링) =====
function loadAll(){
  return fetch(API_URL+'?action=getBills')
    .then(function(r){return r.json()})
    .then(function(data){
      var all = data||[];
      // 사업자번호로 필터링
      if(currentBiz){
        var bizClean = currentBiz.replace(/[^0-9]/g,'');
        allBills = all.filter(function(x){
          return (x.applyBiz||'').replace(/[^0-9]/g,'') === bizClean;
        });
      } else {
        allBills = all;
      }
      return allBills;
    })
    .catch(function(e){console.error('Load error:',e);return[];});
}

var currentIdx = -1;

// 상태 한글 매핑
var STATUS_MAP = {
  wait:'대기', select:'선택', input:'입력', endorse:'배서', done:'완료', cancel:'취소'
};
function badgeClass(s){
  return {wait:'badge-wait',select:'badge-select',input:'badge-input',endorse:'badge-endorse',done:'badge-done',cancel:'badge-cancel'}[s]||'badge-wait';
}

// ===== 대시보드 렌더 =====
function renderDashboard(){
  var prog = allBills.filter(function(x){return x.status!=='done'&&x.status!=='cancel'}).length;
  var done = allBills.filter(function(x){return x.status==='done'}).length;
  $('dTotal').textContent = allBills.length;
  $('dProg').textContent = prog;
  $('dDone').textContent = done;
}

// ===== 리스트 렌더 =====
function renderList(){
  var el = $('listBody');
  if(!allBills.length){
    el.innerHTML='<div class="empty-msg">신청 내역이 없습니다.</div>';
    return;
  }
  // 최신순
  var items = allBills.map(function(x,i){x._idx=i;return x;}).reverse();
  el.innerHTML = items.map(function(iq){
    var st = STATUS_MAP[iq.status]||'대기';
    var bc = badgeClass(iq.status);
    return '<div class="list-item" onclick="openModal('+iq._idx+')">'
      +'<div class="list-top"><span class="list-company">'+((iq.issuerName||'-'))+'</span><span class="list-amount">\u20a9'+fmt(iq.billAmount)+'</span></div>'
      +'<div class="list-bottom"><span class="list-meta">'+((iq.billDue||'-'))+' · '+((iq.uid||''))+'</span><span class="badge '+bc+'">'+st+'</span></div>'
      +'</div>';
  }).join('');
}

// ===== 상태 진행바 HTML =====
function progressHTML(status){
  var steps = ['wait','select','input','endorse','done'];
  var labels = ['대기','선택','입력','배서','완료'];
  if(status==='cancel'){
    return '<div class="progress-bar"><div class="step cancel" style="flex:1">취소됨</div></div>';
  }
  var idx = steps.indexOf(status);
  return '<div class="progress-bar">'+steps.map(function(s,i){
    var cls = i<idx?'done':i===idx?'active':'';
    return '<div class="step '+cls+'">'+labels[i]+'</div>';
  }).join('')+'</div>';
}

// ===== 기본 정보 HTML =====
function baseInfoHTML(iq){
  return '<div class="info-grid">'
    +'<div class="info-item"><div class="lbl">접수번호</div><div class="val">'+(iq.uid||'-')+'</div></div>'
    +'<div class="info-item"><div class="lbl">접수일시</div><div class="val">'+(iq.timestamp||'-')+'</div></div>'
    +'<div class="info-item"><div class="lbl">신청업체</div><div class="val">'+(iq.applyName||'-')+'</div></div>'
    +'<div class="info-item"><div class="lbl">사업자번호</div><div class="val">'+(iq.applyBiz||'-')+'</div></div>'
    +'<div class="info-item"><div class="lbl">발행사</div><div class="val">'+(iq.issuerName||'-')+'</div></div>'
    +'<div class="info-item"><div class="lbl">사업자번호</div><div class="val">'+(iq.issuerBiz||'-')+'</div></div>'
    +'<div class="info-item"><div class="lbl">어음금액</div><div class="val hl">\u20a9'+fmt(iq.billAmount)+'</div></div>'
    +'<div class="info-item"><div class="lbl">만기일</div><div class="val">'+(iq.billDue||'-')+'</div></div>'
    +'<div class="info-item"><div class="lbl">조회일</div><div class="val">'+(iq.startDate||'-')+'</div></div>'
    +'<div class="info-item"><div class="lbl">사용일수</div><div class="val hl">'+(iq.usageDays||'-')+'일</div></div>'
    +'</div>';
}

// ===== 할인 결과 HTML =====
function discountHTML(iq){
  if(!iq.rate) return '';
  return '<div class="result-panel"><h3>할인 조건</h3>'
    +'<div class="result-row"><span class="result-lbl">사용일수</span><span class="result-val">'+(iq.usageDays||0)+'일</span></div>'
    +'<div class="result-row"><span class="result-lbl">월할인율</span><span class="result-val">'+iq.rate+'%</span></div>'
    +'<div class="result-row"><span class="result-lbl">할인액 (수수료 포함)</span><span class="result-val fee">\u20a9'+fmt(iq.fee)+'원</span></div>'
    +'<div class="result-row"><span class="result-lbl">입금액</span><span class="result-val net">\u20a9'+fmt(iq.net)+'원</span></div>'
    +'</div>';
}

// ===== 분할배서 HTML =====
function splitHTML(iq){
  if(!iq.splitEndorsement) return '';
  var h = '<div class="split-panel"><h4>분할배서 조건 ('+iq.splitCount+'장)</h4>';
  for(var i=0;i<iq.splitCount;i++){
    h += '<div class="split-row"><span class="sn">'+(i+1)+'장</span><span class="sa">\u20a9'+fmt(iq.splitAmounts[i])+'원</span></div>';
  }
  h += '</div>';
  return h;
}

// ===== 계좌/첨부 정보 HTML =====
function accountInfoHTML(iq){
  var bk = iq.bankName||''; var ac = iq.accountNo||''; var fn = iq.attachmentName||'';
  if(!bk&&!ac&&!fn) return '';
  var h = '<div class="form-section"><h3>입금 계좌 및 첨부파일</h3>';
  h += '<div class="info-grid">';
  h += '<div class="info-item"><div class="lbl">은행명</div><div class="val">'+(bk||'-')+'</div></div>';
  h += '<div class="info-item"><div class="lbl">계좌번호</div><div class="val">'+(ac||'-')+'</div></div>';
  if(fn) h += '<div class="info-item info-full"><div class="lbl">첨부파일 (매출계산서)</div><div class="val">'+fn+'</div></div>';
  h += '</div></div>';
  return h;
}

// ===== 배서 계좌 정보 HTML =====
function endorseHTML(showGuide){
  var title = showGuide ? '아래 계좌로 배서해 주세요' : '배서 계좌 정보';
  return '<div class="endorse-panel"><h3>'+title+'</h3>'
    +'<div class="endorse-row"><span class="endorse-lbl">은행</span><span class="endorse-val">'+ENDORSE_INFO.bank+'</span></div>'
    +'<div class="endorse-row"><span class="endorse-lbl">계좌번호</span><span class="endorse-val">'+ENDORSE_INFO.account+'</span></div>'
    +'<div class="endorse-row"><span class="endorse-lbl">명의자</span><span class="endorse-val">'+ENDORSE_INFO.holder+'</span></div>'
    +'<div class="endorse-row"><span class="endorse-lbl">실명번호</span><span class="endorse-val">'+ENDORSE_INFO.idNo+'</span></div>'
    +'</div>';
}

// ===== 입금일 정보 HTML =====
function depositHTML(iq){
  var dd = iq.depositDate||'';
  return '<div class="deposit-panel"><h3>입금 정보</h3>'
    +'<div class="deposit-date">'+(dd?dd:'입금전')+'</div>'
    +'</div>';
}

// ===== 모달 열기 =====
function openModal(idx){
  if(idx<0||idx>=allBills.length) return;
  currentIdx = idx;
  var iq = allBills[idx];
  var st = iq.status||'wait';

  $('modalTitle').textContent = (iq.issuerName||'문의')+' — '+(STATUS_MAP[st]||'대기');

  var html = '';
  // 진행바
  html += progressHTML(st);
  // 기본 정보
  html += baseInfoHTML(iq);
  html += '<hr class="divider">';

  // 상태별 분기
  if(st === 'wait'){
    html += '<div style="text-align:center;padding:20px;color:#888;font-size:0.88rem">관리자가 할인 조건을 검토 중입니다.<br>잠시만 기다려주세요.</div>';
    html += '<div class="btn-row"><button class="btn btn-secondary" onclick="closeModal()">닫기</button></div>';
  }
  else if(st === 'select'){
    html += discountHTML(iq);
    html += splitHTML(iq);
    html += '<div class="btn-row">'
      +'<button class="btn btn-danger" onclick="doCancel()">취소</button>'
      +'<button class="btn btn-primary" onclick="doRequestProceed()">진행요청</button>'
      +'</div>';
  }
  else if(st === 'input'){
    html += discountHTML(iq);
    html += splitHTML(iq);
    // 배서 대상 계좌 안내
    html += endorseHTML(true);
    // 입력 폼
    html += '<div class="form-section" id="inputForm"><h3>입금 계좌 및 첨부파일</h3>'
      +'<div class="row2"><div class="field"><label>은행명</label><input type="text" id="fBankName" value="'+(iq.bankName||'')+'" placeholder="은행명 입력"></div>'
      +'<div class="field"><label>계좌번호</label><input type="text" id="fAccountNo" value="'+(iq.accountNo||'')+'" placeholder="계좌번호 입력" inputmode="numeric"></div></div>'
      +'<div class="field"><label>첨부파일 (매출계산서)</label>'
      +'<div class="file-area" onclick="$(\'fileInput\').click()"><div class="icon">📎</div><div class="text">클릭하여 파일 업로드</div></div>'
      +'<input type="file" id="fileInput" class="file-input" onchange="onFileSelect(this)" accept=".pdf,.jpg,.jpeg,.png,.xlsx,.xls">'
      +'<div class="file-name" id="fileName">'+(iq.attachmentName||'')+'</div>'
      +'</div></div>';
    html += '<div class="btn-row">'
      +'<button class="btn btn-warn" onclick="showEditMode()">수정하기</button>'
      +'<button class="btn btn-success" onclick="doSaveAndEndorse()">저장 및 배서</button>'
      +'</div>';
  }
  else if(st === 'endorse'){
    html += discountHTML(iq);
    html += splitHTML(iq);
    html += accountInfoHTML(iq);
    html += endorseHTML();
    html += '<div class="btn-row">'
      +'<button class="btn btn-success" onclick="doEndorseComplete()">배서완료</button>'
      +'</div>';
  }
  else if(st === 'done'){
    html += discountHTML(iq);
    html += splitHTML(iq);
    html += accountInfoHTML(iq);
    html += endorseHTML();
    html += depositHTML(iq);
    html += '<div class="btn-row"><button class="btn btn-secondary" onclick="closeModal()">닫기</button></div>';
  }
  else if(st === 'cancel'){
    html += '<div style="text-align:center;padding:20px;color:#c62828;font-size:0.92rem;font-weight:700">이 문의는 취소되었습니다.</div>';
    html += '<div class="btn-row"><button class="btn btn-secondary" onclick="closeModal()">닫기</button></div>';
  }

  $('modalBody').innerHTML = html;
  $('modalOverlay').classList.add('show');
  document.body.style.overflow='hidden';
}

function closeModal(){
  $('modalOverlay').classList.remove('show');
  document.body.style.overflow='';
  currentIdx=-1;
}

// ===== 액션: 취소 =====
function doCancel(){
  if(currentIdx<0) return;
  if(!confirm('정말 취소하시겠습니까?')) return;
  var iq = allBills[currentIdx];
  var payload = {
    action:'updateBill',
    uid:iq.uid,
    status:'cancel',
    cancelledAt:new Date().toLocaleString('ko-KR'),
    _slackText:'[취소] '+iq.issuerName+'\n신청: '+iq.applyName+'\n어음: \u20a9'+fmt(iq.billAmount)+'원'
  };
  updateBillAPI(payload).then(function(){
    return loadAll();
  }).then(function(){
    renderDashboard(); renderList();
    showToast('문의가 취소되었습니다.','err');
    closeModal();
  });
}

// ===== 액션: 진행요청 (선택→입력) =====
function doRequestProceed(){
  if(currentIdx<0) return;
  var iq = allBills[currentIdx];
  var payload = {
    action:'updateBill',
    uid:iq.uid,
    status:'input',
    _slackText:'[진행요청] '+iq.issuerName+'\n신청: '+iq.applyName
  };
  updateBillAPI(payload).then(function(){
    return loadAll();
  }).then(function(){
    renderDashboard(); renderList();
    showToast('진행요청 완료 — 계좌정보를 입력해주세요.','ok');
    // 모달 새로고침
    openModal(currentIdx);
  });
}

// ===== 파일 선택 =====
function onFileSelect(el){
  if(el.files&&el.files[0]){
    $('fileName').textContent = el.files[0].name;
  }
}

// ===== 액션: 저장 및 배서 (입력→배서) =====
function doSaveAndEndorse(){
  if(currentIdx<0) return;
  var bankName = $('fBankName')?$('fBankName').value.trim():'';
  var accountNo = $('fAccountNo')?$('fAccountNo').value.trim():'';
  var fileEl = $('fileInput');
  var fileName = (fileEl&&fileEl.files&&fileEl.files[0])?fileEl.files[0].name:'';

  if(!bankName||!accountNo){
    showToast('은행명과 계좌번호를 입력해주세요.','err');
    return;
  }

  var iq = allBills[currentIdx];
  var payload = {
    action:'updateBill',
    uid:iq.uid,
    bankName:bankName,
    accountNo:accountNo,
    attachmentName:fileName||iq.attachmentName,
    status:'endorse',
    _slackText:'[배서 요청] '+iq.issuerName+'\n신청: '+iq.applyName+'\n어음: \u20a9'+fmt(iq.billAmount)+'원\n계좌: '+bankName+' '+accountNo
  };
  updateBillAPI(payload).then(function(){
    return loadAll();
  }).then(function(){
    renderDashboard(); renderList();
    showToast('저장 완료 — 배서 단계로 이동합니다.','ok');
    openModal(currentIdx);
  });
}

// ===== 수정 모드 (입력 상태에서) =====
function showEditMode(){
  if(currentIdx<0) return;
  var iq = allBills[currentIdx];

  var html = progressHTML(iq.status);
  html += '<div class="edit-section"><h3>문의 정보 수정</h3>'
    +'<div class="field"><label>신청업체</label><input type="text" id="eApplyName" value="'+(iq.applyName||'')+'"></div>'
    +'<div class="field"><label>발행사</label><input type="text" id="eIssuerName" value="'+(iq.issuerName||'')+'"></div>'
    +'<div class="field"><label>어음금액 (원)</label><input type="text" id="eAmount" value="'+fmt(iq.billAmount)+'" inputmode="numeric" oninput="editFormatAmount(this)"></div>'
    +'<div class="row2"><div class="field"><label>조회일</label><input type="date" id="eStartDate" value="'+(iq.startDate||'')+'"></div>'
    +'<div class="field"><label>만기일</label><input type="date" id="eBillDue" value="'+(iq.billDue||'')+'"></div></div>'
    +'</div>';
  html += '<div class="btn-row">'
    +'<button class="btn btn-danger" onclick="doCancelFromEdit()">취소</button>'
    +'<button class="btn btn-primary" onclick="doEditComplete()">변경완료</button>'
    +'</div>';

  $('modalBody').innerHTML = html;
}

function editFormatAmount(el){
  var v=el.value.replace(/[^0-9]/g,'');
  if(v.length>0&&v[0]==='0')v=v.replace(/^0+/,'')||'';
  el.value=v?Number(v).toLocaleString('ko-KR'):'';
}

// 수정모드에서 취소 → 상태를 cancel로 (4.(a))
function doCancelFromEdit(){
  if(!confirm('취소하시겠습니까? 문의가 취소됩니다.')) return;
  doCancel();
}

// 변경완료 → 정보 업데이트 후 배서 단계로 이동 (6번)
function doEditComplete(){
  if(currentIdx<0) return;
  var iq = allBills[currentIdx];

  var newApply = $('eApplyName')?$('eApplyName').value.trim():'';
  var newIssuer = $('eIssuerName')?$('eIssuerName').value.trim():'';
  var newAmount = parseNum($('eAmount')?$('eAmount').value:'0');
  var newStart = $('eStartDate')?$('eStartDate').value:'';
  var newDue = $('eBillDue')?$('eBillDue').value:'';

  if(!newApply||!newIssuer||!newAmount||!newDue){
    showToast('모든 항목을 입력해주세요.','err');
    return;
  }

  // 사용일수 재계산
  var usageDays = iq.usageDays;
  if(newStart&&newDue){
    var settle = nextBusinessDay(newDue);
    usageDays = daysBetween(newStart, fmtDate(settle))+1;
  }
  // 할인액 재계산
  var fee = iq.fee;
  var net = iq.net;
  if(iq.rate){
    fee = calcDiscount(newAmount, iq.rate, usageDays);
    net = newAmount - fee;
  }

  var payload = {
    action:'updateBill',
    uid:iq.uid,
    applyName:newApply,
    issuerName:newIssuer,
    billAmount:newAmount,
    startDate:newStart,
    billDue:newDue,
    usageDays:usageDays,
    fee:fee,
    net:net,
    status:'endorse',
    _slackText:'[정보수정] '+newIssuer+'\n신청: '+newApply+'\n어음: \u20a9'+fmt(newAmount)+'원'
  };
  updateBillAPI(payload).then(function(){
    return loadAll();
  }).then(function(){
    renderDashboard(); renderList();
    showToast('변경 완료 — 배서 단계로 이동합니다.','ok');
    openModal(currentIdx);
  });
}

// ===== 액션: 배서완료 (배서→관리자 입금완료 대기) =====
function doEndorseComplete(){
  if(currentIdx<0) return;
  var iq = allBills[currentIdx];
  var payload = {
    action:'updateBill',
    uid:iq.uid,
    endorseCompleted:true,
    endorseCompletedAt:new Date().toLocaleString('ko-KR'),
    _slackText:'[배서 완료] '+iq.issuerName+'\n신청: '+iq.applyName+'\n어음: \u20a9'+fmt(iq.billAmount)+'원\n→ 입금완료 버튼 대기중'
  };
  updateBillAPI(payload).then(function(){
    return loadAll();
  }).then(function(){
    renderDashboard(); renderList();
    showToast('배서완료 처리되었습니다. 입금을 기다려주세요.','ok');
    closeModal();
  });
}

// ===== 토스트 =====
function showToast(msg,type){
  var el=$('toast');
  el.textContent=msg;
  el.className='msg-toast msg-'+(type||'ok');
  el.style.display='block';
  setTimeout(function(){el.style.display='none'},3000);
}

// ===== ESC =====
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal()});

// ===== 초기화 =====
(function init(){
  // URL 파라미터에 사업자번호가 있으면 자동 진입
  var params = new URLSearchParams(window.location.search);
  var bizParam = params.get('biz');
  if(bizParam){
    currentBiz = bizParam;
    loadAll().then(function(){
      $('loginScreen').style.display = 'none';
      $('dashScreen').style.display = 'block';
      $('loginInfo').innerHTML = '사업자번호: <strong>'+currentBiz+'</strong>';
      renderDashboard();
      renderList();
    });
  }
})();
</script>
</body>
</html>
