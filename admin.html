<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>전자어음 할인 관리자</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f0f2f5;color:#333;line-height:1.5;font-size:12px}
.wrap{max-width:960px;margin:0 auto;padding:12px}
h1{text-align:center;color:#1565c0;font-size:1.15rem;padding:14px 0 4px}
.subtitle{text-align:center;color:#888;font-size:0.68rem;margin-bottom:4px}
.bar{height:3px;background:linear-gradient(90deg,#1565c0,#42a5f5);border-radius:2px;margin-bottom:14px}

/* 대시보드 카드 */
.dash{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.dash-card{background:#fff;border-radius:10px;padding:12px 6px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,0.06)}
.dash-card .num{font-size:1.35rem;font-weight:800;line-height:1.2}
.dash-card .sub-amount{font-size:0.72rem;font-weight:600;margin-top:2px;line-height:1.3}
.dash-card .label{font-size:0.62rem;color:#888;margin-top:4px}
.c-total{color:#1565c0}.c-wait{color:#e65100}.c-prog{color:#7b1fa2}.c-cancel{color:#c62828}.c-done{color:#2e7d32}

/* 필터 바 */
.filter-bar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.filter-bar input,.filter-bar select{padding:7px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:0.78rem;outline:none}
.filter-bar input:focus,.filter-bar select:focus{border-color:#1565c0}
.filter-bar input[type="text"]{flex:1;min-width:120px}
.filter-bar input[type="date"]{width:130px}
.filter-bar .filter-row{display:flex;gap:6px}
.filter-bar .date-group{display:flex;align-items:center;gap:4px}
.filter-bar .date-sep{font-size:0.7rem;color:#bbb}

/* 리스트 — 데스크톱 8컬럼 */
.list-header{display:grid;grid-template-columns:34px 62px 68px 1fr 1fr 100px 58px 72px;gap:5px;padding:8px 12px;font-size:0.65rem;font-weight:700;color:#888;border-bottom:2px solid #e0e0e0}
.list-item{display:grid;grid-template-columns:34px 62px 68px 1fr 1fr 100px 58px 72px;gap:5px;align-items:center;padding:10px 12px;background:#fff;border-radius:10px;margin-bottom:5px;box-shadow:0 1px 4px rgba(0,0,0,0.04);font-size:0.78rem;cursor:pointer;transition:all 0.15s}
.list-item:hover{box-shadow:0 3px 12px rgba(21,101,192,0.12);transform:translateY(-1px)}
.list-item .no{color:#999;font-size:0.7rem}
.list-item .company{font-weight:700;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-item .issuer{color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-item .amount{font-weight:700;color:#1565c0;text-align:right;font-size:0.76rem}
.list-item .rate{font-size:0.76rem;color:#e65100;text-align:center;font-weight:700}
.list-item .date{font-size:0.65rem;color:#666;text-align:center}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:0.64rem;font-weight:700}

/* 모바일 카드 뷰 */
.list-mobile{display:none}
.m-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,0.06);cursor:pointer;transition:all .15s}
.m-card:hover{box-shadow:0 3px 12px rgba(21,101,192,0.12)}
.m-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.m-companies{font-weight:700;font-size:0.82rem;color:#333;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.m-companies .arr{color:#bbb;margin:0 4px;font-weight:400}
.m-row2{display:flex;justify-content:space-between;align-items:center;gap:8px}
.m-amount{font-weight:800;font-size:0.88rem;color:#1565c0}
.m-rate{font-size:0.74rem;color:#e65100;font-weight:700}
.m-dates{display:flex;gap:10px;margin-top:6px;font-size:0.68rem;color:#999}
.m-dates span strong{color:#555;font-weight:600}
.badge-wait{background:#fff3e0;color:#e65100}
.badge-select{background:#e3f2fd;color:#1565c0}
.badge-input{background:#f3e5f5;color:#7b1fa2}
.badge-endorse{background:#fff8e1;color:#f57f17}
.badge-endorsed{background:#e0f2f1;color:#00695c}
.badge-done{background:#e8f5e9;color:#2e7d32}
.badge-cancel{background:#ffebee;color:#c62828}
.empty-msg{text-align:center;color:#bbb;padding:40px;font-size:0.82rem}
.load-more-btn{display:flex;align-items:center;justify-content:center;gap:6px;margin:12px auto 0;padding:8px 24px;background:#f5f5f5;border:1px solid #e0e0e0;border-radius:20px;font-size:0.78rem;color:#555;cursor:pointer;transition:background 0.2s}
.load-more-btn:hover{background:#e8e8e8}

/* 모달 */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:1000;justify-content:center;align-items:flex-start;padding:16px;overflow-y:auto}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:580px;max-height:none;margin:40px auto;box-shadow:0 8px 40px rgba(0,0,0,0.2)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px 14px;border-bottom:1px solid #eee}
.modal-header h2{font-size:1rem;color:#1565c0}
.modal-close{width:32px;height:32px;border:none;background:#f5f5f5;border-radius:50%;font-size:1.1rem;cursor:pointer;color:#888;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:#e0e0e0;color:#333}
.modal-body{padding:20px}

/* 정보 그리드 */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.info-item{background:#f8f9fa;border-radius:10px;padding:10px 12px}
.info-item .lbl{font-size:0.72rem;color:#888;font-weight:600;margin-bottom:2px}
.info-item .val{font-size:0.92rem;font-weight:700;color:#333}
.info-item .val.hl{color:#1565c0}
.info-full{grid-column:1/-1}
.divider{border:none;border-top:2px solid #e3f2fd;margin:8px 0 16px}

/* 상태 진행바 */
.progress-bar{display:flex;gap:3px;margin-bottom:18px}
.step{flex:1;text-align:center;padding:7px 0;border-radius:7px;font-size:0.65rem;font-weight:700;background:#f0f0f0;color:#bbb;transition:all 0.3s}
.step.active{background:#1565c0;color:#fff}
.step.done-s{background:#e8f5e9;color:#2e7d32}
.step.cancel-s{background:#ffebee;color:#c62828}

/* 할인 조건 입력 */
.rate-section{background:linear-gradient(135deg,#e8eaf6,#e3f2fd);border-radius:14px;padding:20px;margin-bottom:16px}
.rate-section h3{font-size:0.88rem;color:#1565c0;margin-bottom:14px}
.rate-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.field{margin-bottom:12px}
.field label{display:block;font-size:0.75rem;color:#666;font-weight:600;margin-bottom:4px}
.field input,.field select{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:0.95rem;outline:none;background:#fff}
.field input:focus,.field select:focus{border-color:#1565c0;box-shadow:0 0 0 3px rgba(21,101,192,0.08)}
.field input[readonly]{background:#f5f5f5;color:#1565c0;font-weight:700}

/* 결과 패널 */
.result-panel{background:#fff;border-radius:12px;padding:16px;margin-top:12px;border:2px solid #e3f2fd}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.04)}
.result-row:last-child{border-bottom:none}
.result-lbl{font-size:0.82rem;color:#666}
.result-val{font-size:1rem;font-weight:700;color:#1565c0}
.result-val.fee{color:#e65100;font-size:1.05rem}
.result-val.net{color:#2e7d32;font-size:1.15rem}

/* 분할배서 입력 */
.split-section{background:#fff8e1;border-radius:14px;padding:18px;margin-bottom:16px;border:1.5px solid #ffe082}
.split-section h3{font-size:0.88rem;color:#f57f17;margin-bottom:12px}
.split-check{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:0.88rem;font-weight:600;cursor:pointer}
.split-check input[type="checkbox"]{width:18px;height:18px;accent-color:#f57f17}
.split-inputs{margin-top:10px}
.split-row-input{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.split-row-input .sn{font-size:0.82rem;color:#888;width:36px;text-align:center;font-weight:600}
.split-row-input input{flex:1;padding:9px 12px;border:1.5px solid #ffe082;border-radius:8px;font-size:0.92rem;outline:none;text-align:right}
.split-row-input input:focus{border-color:#f57f17}
.split-total{display:flex;justify-content:space-between;padding:10px 0;margin-top:8px;border-top:2px solid #ffe082;font-weight:700;font-size:0.88rem}
.split-total .match{color:#2e7d32}
.split-total .mismatch{color:#c62828}

/* 신청자 입력 정보 (읽기전용) */
.applicant-info{background:#f3e5f5;border-radius:14px;padding:16px;margin-bottom:16px;border:1.5px solid #ce93d8}
.applicant-info h3{font-size:0.88rem;color:#7b1fa2;margin-bottom:10px}
.ai-row{display:flex;justify-content:space-between;padding:5px 0;font-size:0.85rem;border-bottom:1px solid rgba(0,0,0,0.04)}
.ai-row:last-child{border-bottom:none}
.ai-lbl{color:#888}.ai-val{font-weight:600;color:#333}

/* 버튼 */
.btn-row{display:flex;gap:10px;margin-top:16px}
.btn{flex:1;padding:13px;border:none;border-radius:10px;font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-primary{background:linear-gradient(135deg,#1565c0,#1e88e5);color:#fff;box-shadow:0 4px 12px rgba(21,101,192,0.3)}
.btn-primary:hover{transform:translateY(-1px)}
.btn-success{background:linear-gradient(135deg,#2e7d32,#43a047);color:#fff;box-shadow:0 4px 12px rgba(46,125,50,0.3)}
.btn-success:hover{transform:translateY(-1px)}
.btn-secondary{background:#f5f5f5;color:#666}
.btn-secondary:hover{background:#e0e0e0;color:#333}
.btn-slack{background:linear-gradient(135deg,#611bb8,#7c4dff);color:#fff;box-shadow:0 4px 12px rgba(124,77,255,0.3)}
.btn-deposit{background:linear-gradient(135deg,#00695c,#00897b);color:#fff;box-shadow:0 4px 12px rgba(0,105,92,0.3)}
.btn-deposit:hover{transform:translateY(-1px)}

/* 토스트 */
.msg-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:10px;font-size:0.88rem;font-weight:600;color:#fff;z-index:2000;display:none}
.msg-ok{background:#2e7d32}.msg-err{background:#c62828}

/* 팝업 */
.popup-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.3);z-index:3000;justify-content:center;align-items:center}
.popup-overlay.show{display:flex}
.popup{background:#fff;border-radius:14px;padding:24px;max-width:400px;width:90%;box-shadow:0 8px 30px rgba(0,0,0,0.2);text-align:center}
.popup h3{color:#c62828;margin-bottom:12px;font-size:1rem}
.popup .detail{font-size:0.88rem;color:#555;margin-bottom:6px}
.popup .diff{font-size:1.2rem;font-weight:800;margin:10px 0}
.popup .diff.plus{color:#c62828}
.popup .diff.minus{color:#1565c0}
.popup-close{position:absolute;top:10px;right:14px;background:none;border:none;font-size:1.2rem;cursor:pointer;color:#888}

/* 할인조건 확인 팝업 */
.confirm-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:3500;justify-content:center;align-items:flex-start;padding:16px;overflow-y:auto}
.confirm-overlay.show{display:flex}
.confirm-box{background:#fff;border-radius:16px;padding:24px;max-width:460px;width:95%;margin:60px auto;box-shadow:0 8px 40px rgba(0,0,0,0.25)}
.confirm-box h3{text-align:center;color:#1565c0;font-size:1rem;margin-bottom:16px}
.confirm-row{display:flex;justify-content:space-between;padding:8px 0;font-size:0.88rem;border-bottom:1px solid #f0f0f0}
.confirm-row:last-child{border-bottom:none}
.confirm-row .cl{color:#888}.confirm-row .cv{font-weight:700;color:#333}
.confirm-row .cv.fee{color:#e65100}.confirm-row .cv.net{color:#2e7d32}
.confirm-split{background:#fff8e1;border-radius:10px;padding:12px;margin:10px 0}
.confirm-split-title{font-size:0.82rem;font-weight:700;color:#f57f17;margin-bottom:6px}
.confirm-split-row{display:flex;justify-content:space-between;font-size:0.85rem;padding:3px 0}
.confirm-btn-row{display:flex;gap:10px;margin-top:18px}
.confirm-btn-row .btn{flex:1;padding:13px;border:none;border-radius:10px;font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.2s}
.btn-edit{background:#f5f5f5;color:#666}
.btn-edit:hover{background:#e0e0e0;color:#333}
.btn-send{background:linear-gradient(135deg,#1565c0,#1e88e5);color:#fff;box-shadow:0 4px 12px rgba(21,101,192,0.3)}
.btn-send:hover{transform:translateY(-1px)}
.btn-send:disabled{opacity:0.6;transform:none;cursor:not-allowed}

.footer{text-align:center;color:#aaa;font-size:0.65rem;padding:20px 0 10px}

/* PIN 인증 화면 */
.pin-screen{display:flex;align-items:center;justify-content:center;min-height:70vh}
.pin-card{background:#fff;border-radius:14px;padding:36px 28px;max-width:380px;width:100%;box-shadow:0 2px 12px rgba(0,0,0,0.08);text-align:center}
.pin-card h2{font-size:1rem;color:#1565c0;margin-bottom:6px}
.pin-card p{font-size:0.82rem;color:#888;margin-bottom:20px}
.pin-card .field input{text-align:center;font-size:1.4rem;font-weight:700;letter-spacing:8px;padding:14px}
.pin-card .pin-btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:0.95rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#1565c0,#1e88e5);color:#fff;box-shadow:0 4px 12px rgba(21,101,192,0.3);margin-top:16px;transition:all 0.2s}
.pin-card .pin-btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(21,101,192,0.4)}
.pin-msg{margin-top:12px;font-size:0.82rem;color:#c62828;min-height:20px}

/* === 데스크톱 (960px+) 기본 === */

/* 태블릿 (700px~960px) */
@media(max-width:960px){
  .wrap{max-width:100%;padding:12px}
  .dash{grid-template-columns:repeat(5,1fr);gap:8px}
  .dash-card{padding:10px}
  .dash-card .num{font-size:1.3rem}
}

/* 모바일 (640px 이하) */
@media(max-width:640px){
  .wrap{padding:8px}
  h1{font-size:1.05rem;padding:10px 0 3px}
  .subtitle{font-size:0.64rem}
  .dash{grid-template-columns:repeat(5,1fr);gap:4px}
  .dash-card{padding:8px 4px;border-radius:8px}
  .dash-card .num{font-size:1rem}
  .dash-card .sub-amount{font-size:0.58rem}
  .dash-card .label{font-size:0.52rem}
  .filter-bar{flex-direction:column;gap:6px}
  .filter-bar input[type="text"]{width:100%;min-width:auto}
  .filter-bar .filter-row{width:100%}
  .filter-bar .filter-row select{flex:1}
  .filter-bar .date-group{width:100%;flex-wrap:wrap}
  .filter-bar input[type="date"]{flex:1;min-width:0}
  .list-header{display:none}
  .list-desktop{display:none}
  .list-mobile{display:block}
  .modal{margin:16px auto;border-radius:12px}
  .modal-body{padding:14px}
  .info-grid{grid-template-columns:1fr 1fr;gap:8px}
  .rate-row{grid-template-columns:1fr}
  .rate-section{padding:14px}
  .split-section{padding:14px}
  .result-panel{padding:12px}
}

/* 소형 모바일 (400px 이하) */
@media(max-width:400px){
  .wrap{padding:8px}
  .dash{grid-template-columns:repeat(5,1fr);gap:3px}
  .dash-card{padding:6px 2px}
  .dash-card .num{font-size:0.9rem}
  .dash-card .sub-amount{font-size:0.52rem}
  .modal{margin:8px auto}
  .modal-header{padding:14px 16px 10px}
  .modal-body{padding:12px}
}
</style>
</head>
<body>
<div class="wrap">

  <!-- ===== PIN 인증 화면 ===== -->
  <div id="pinScreen">
    <h1>전자어음 할인 관리자</h1>
    <p class="subtitle">276홀딩스 · 관리 대시보드</p>
    <div class="bar"></div>
    <div class="pin-screen">
      <div class="pin-card">
        <h2>관리자 인증</h2>
        <p>관리자 PIN을 입력해 주세요.</p>
        <div class="field">
          <input type="password" id="pinInput" placeholder="••••••" maxlength="6" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'')" onkeydown="if(event.key==='Enter')doPin()">
        </div>
        <button class="pin-btn" onclick="doPin()">확인</button>
        <div class="pin-msg" id="pinMsg"></div>
      </div>
    </div>
  </div>

  <!-- ===== 관리자 대시보드 (초기 숨김) ===== -->
  <div id="adminScreen" style="display:none">
  <h1>전자어음 할인 관리자</h1>
  <p class="subtitle">276홀딩스 · 관리 대시보드</p>
  <div class="bar"></div>

  <!-- 대시보드 -->
  <div id="filterIndicator" style="display:none;text-align:center;padding:4px 10px;margin-bottom:6px;background:#fff3e0;border-radius:8px;font-size:0.68rem;font-weight:600;color:#e65100">
    <span id="filterIndicatorText"></span>
    <a href="#" onclick="clearAllFilters();return false;" style="margin-left:8px;color:#1565c0;text-decoration:underline;font-weight:700">초기화</a>
  </div>
  <div class="dash">
    <div class="dash-card"><div class="num c-total" id="dTotal">0</div><div class="sub-amount" style="color:#1565c0" id="dTotalAmt">0원</div><div class="label">전체 신청</div></div>
    <div class="dash-card"><div class="num c-wait" id="dWait">0</div><div class="sub-amount" style="color:#e65100" id="dWaitAmt">0원</div><div class="label">대기</div></div>
    <div class="dash-card"><div class="num c-prog" id="dProg">0</div><div class="sub-amount" style="color:#7b1fa2" id="dProgAmt">0원</div><div class="label">진행중</div></div>
    <div class="dash-card"><div class="num c-cancel" id="dCancel">0</div><div class="sub-amount" style="color:#c62828" id="dCancelAmt">0원</div><div class="label">취소</div></div>
    <div class="dash-card"><div class="num c-done" id="dDone">0</div><div class="sub-amount" style="color:#2e7d32" id="dDoneAmt">0원</div><div class="label">완료</div></div>
  </div>

  <!-- 필터 -->
  <div class="filter-bar">
    <input type="text" id="filterText" placeholder="수취사 / 발행사 검색" oninput="currentPage=1;renderList()">
    <div class="filter-row">
      <select id="filterStatus" onchange="currentPage=1;renderList()">
        <option value="all">전체</option>
        <option value="wait">대기</option>
        <option value="select">선택</option>
        <option value="input">입력</option>
        <option value="endorse">배서</option>
        <option value="done">완료</option>
        <option value="cancel">취소</option>
      </select>
      <select id="filterDateType" onchange="toggleDateRange();currentPage=1;renderList()">
        <option value="none">날짜검색</option>
        <option value="start">입금예정일</option>
        <option value="due">만기일</option>
      </select>
    </div>
    <div class="date-group" id="dateRange" style="display:none">
      <input type="date" id="dateFrom" onchange="currentPage=1;renderList()">
      <span class="date-sep">~</span>
      <input type="date" id="dateTo" onchange="currentPage=1;renderList()">
    </div>
  </div>

  <!-- 리스트 헤더 (데스크톱) -->
  <div class="list-header">
    <span>#</span>
    <span style="text-align:center">상태</span>
    <span style="text-align:center">입금예정일</span>
    <span>수취사</span>
    <span>발행사</span>
    <span style="text-align:right">어음금액</span>
    <span style="text-align:center">할인율</span>

<script>
// ===== Config =====
var API_URL = 'https://script.google.com/macros/s/AKfycbxLTGdKtQuX4hAG-rKuPDuuMoRB47uF-e4-PinBuAsyCc7MhxG-P1RUA1077N51kquxQw/exec';
var ADMIN_PIN = '276276';

// ===== 자동 새로고침 (30초) =====
var autoRefreshTimer = null;
function startAutoRefresh(){

  autoRefreshTimer = setInterval(function(){
    loadAll().then(function(data){
      list = data;
      renderDashboard();

// ===== Utility =====
function $(id){return document.getElementById(id)}
function fmt(n){return n?Number(n).toLocaleString('ko-KR'):'0'}
function parseNum(s){return parseInt(String(s).replace(/[^0-9]/g,''))||0}
// 날짜 정규화: ISO/UTC → 한국시간 YYYY-MM-DD
function fixDate(v){
  if(!v) return '';
  var s = String(v);
  if(s.indexOf('T')!==-1){
    var d = new Date(s);
    d.setMinutes(d.getMinutes() + d.getTimezoneOffset() + 540);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }
  return s.substring(0,10);
}
function daysBetween(a,b){return Math.ceil((new Date(b)-new Date(a))/(1000*60*60*24))}

// 공휴일
var KR_HOLIDAYS={
  2024:['01-01','02-09','02-10','02-11','02-12','03-01','04-10','05-01','05-06','05-15','06-06','08-15','09-16','09-17','09-18','10-03','10-09','12-25'],
  2025:['01-01','01-28','01-29','01-30','03-01','03-03','05-01','05-05','05-06','06-06','08-15','10-03','10-05','10-06','10-07','10-08','10-09','12-25'],
  2026:['01-01','02-16','02-17','02-18','03-01','03-02','05-01','05-05','05-24','05-25','06-06','06-08','08-15','08-17','10-03','10-04','10-05','10-06','10-07','10-08','10-09','12-25'],
  2027:['01-01','02-06','02-07','02-08','02-09','02-10','03-01','05-01','05-05','05-13','06-06','06-07','08-15','08-16','09-23','09-24','09-25','09-27','10-03','10-04','10-09','10-11','12-25','12-27']
};
function isHoliday(d){var y=d.getFullYear(),mm=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return KR_HOLIDAYS[y]&&KR_HOLIDAYS[y].indexOf(mm+'-'+dd)!==-1;}
function isBusinessDay(d){var dow=d.getDay();if(dow===0||dow===6)return false;return !isHoliday(d);}
function nextBusinessDay(ds){var d=new Date(ds);while(!isBusinessDay(d))d.setDate(d.getDate()+1);return d;}
function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function calcDiscount(amount,rate,days,splitCount){
  days = Math.max(days, 30);
  var baseFee = Math.round(amount*(rate/100)/30*days) + 1500;
  var extraSplit = (splitCount && splitCount > 1) ? (splitCount - 1) * 1500 : 0;
  return baseFee + extraSplit;
}

// ===== Data from API =====
var list = [];

// Load all bills from API
function toArray(data){
  if(Array.isArray(data)) return data;
  if(data && typeof data==='object'){
    if(Array.isArray(data.data)) return data.data;
    if(Array.isArray(data.bills)) return data.bills;
    var keys=Object.keys(data);
    for(var i=0;i<keys.length;i++){if(Array.isArray(data[keys[i]])) return data[keys[i]];}
  }
  return [];
}
function loadAll(){
  return fetch(API_URL + '?action=getBills')
    .then(function(r){return r.json()})
    .then(function(data){
      console.log('API raw response:', data);
      var all = toArray(data);
      all.forEach(function(item){
        if(item.splitAmounts && typeof item.splitAmounts==='string'){
          try{ item.splitAmounts=JSON.parse(item.splitAmounts); }catch(e){ item.splitAmounts=[]; }
        }
      });
      return all;
    })
    .catch(function(e){
      console.error('Failed to load bills:', e);
      return [];
    });
}

// Update a bill via API
function updateBillAPI(uid, updateData){
  var payload = {
    action: 'updateBill',
    uid: uid
  };
  Object.assign(payload, updateData);
  return fetch(API_URL, {
    method: 'POST',
    headers: {'Content-Type': 'text/plain'},
    body: JSON.stringify(payload),
    redirect: 'follow'
  })
    .then(function(r){return r.json()})
    .catch(function(e){
      console.error('Failed to update bill:', e);
      return null;
    });
}

var currentIdx = -1;
var PAGE_SIZE = 30;
var currentPage = 1;

var STATUS_MAP = {wait:'조건대기',select:'조건선택',input:'조건입력',endorse:'배서진행',endorsed:'배서완료',done:'입금완료',cancel:'취소'};
function badgeClass(s){return{wait:'badge-wait',select:'badge-select',input:'badge-input',endorse:'badge-endorse',endorsed:'badge-endorsed',done:'badge-done',cancel:'badge-cancel'}[s]||'badge-wait';}

// ===== 공통 필터 =====
function getFiltered(){
  var filter=$('filterText')?$('filterText').value.trim().toLowerCase():'';
  var status=$('filterStatus')?$('filterStatus').value:'all';
  var dateType=$('filterDateType')?$('filterDateType').value:'none';
  var dateFrom=$('dateFrom')?$('dateFrom').value:'';
  var dateTo=$('dateTo')?$('dateTo').value:'';

  var filtered=list.map(function(x,i){x._idx=i;return x}).filter(function(x){
    if(status!=='all'&&x.status!==status) return false;
    if(filter){var h=((x.applyName||'')+(x.issuerName||'')+(x.uid||'')).toLowerCase();if(h.indexOf(filter)===-1)return false;}
    if(dateType!=='none'){
      var target='';
      if(dateType==='start'){target=fixDate(x.startDate);}
      else if(dateType==='due'){target=fixDate(x.billDue);}
      if(dateFrom&&target<dateFrom) return false;
      if(dateTo&&target>dateTo) return false;
    }
    return true;
  });
  filtered.sort(function(a,b){var da=fixDate(a.startDate)||'',db=fixDate(b.startDate)||'';return da===db?(b._idx||0)-(a._idx||0):da>db?-1:1;});
  return filtered;
}

function isFilterActive(){
  var filter=$('filterText')?$('filterText').value.trim():'';
  var status=$('filterStatus')?$('filterStatus').value:'all';
  var dateType=$('filterDateType')?$('filterDateType').value:'none';
  var dateFrom=$('dateFrom')?$('dateFrom').value:'';
  var dateTo=$('dateTo')?$('dateTo').value:'';
  return !!(filter || status!=='all' || (dateType!=='none' && (dateFrom||dateTo)));
}

function clearAllFilters(){
  if($('filterText')) $('filterText').value='';
  if($('filterStatus')) $('filterStatus').value='all';
  if($('filterDateType')){$('filterDateType').value='none';toggleDateRange();}
  if($('dateFrom')) $('dateFrom').value='';
  if($('dateTo')) $('dateTo').value='';
  currentPage=1;
  renderDashboard();
  renderList();
}

// ===== 대시보드 =====
function fmtAmt(v){
  if(!v)return'0원';
  if(v>=100000000){var a=Math.floor(v/100000000);var m=Math.round((v%100000000)/10000);return a+'억'+(m>0?' '+fmt(m)+'만':'');}
  if(v>=10000)return fmt(Math.round(v/10000))+'만';
  return fmt(v)+'원';
}
function renderDashboard(){
  var data=isFilterActive()?getFiltered():list;
  var wait=0,prog=0,cancel=0,totalAmt=0,waitAmt=0,progAmt=0,cancelAmt=0,doneAmt=0;
  data.forEach(function(x){
    var amt=x.billAmount||0;
    totalAmt+=amt;
    if(x.status==='wait'){wait++;waitAmt+=amt;}
    else if(x.status==='cancel'){cancel++;cancelAmt+=amt;}
    else if(x.status==='done'){doneAmt+=amt;}
    else{prog++;progAmt+=amt;}
  });
  var done=data.length-wait-prog-cancel;
  $('dTotal').textContent=data.length;
  $('dWait').textContent=wait;
  $('dProg').textContent=prog;
  $('dCancel').textContent=cancel;
  $('dDone').textContent=done;
  $('dTotalAmt').textContent=fmtAmt(totalAmt);
  $('dWaitAmt').textContent=fmtAmt(waitAmt);
  $('dProgAmt').textContent=fmtAmt(progAmt);
  $('dCancelAmt').textContent=fmtAmt(cancelAmt);
  $('dDoneAmt').textContent=fmtAmt(doneAmt);

  // 필터 인디케이터
  var ind=$('filterIndicator');
  if(ind){
    if(isFilterActive()){
      var parts=[];
      var ft=$('filterText')?$('filterText').value.trim():'';
      if(ft) parts.push('"'+ft+'"');
      var st=$('filterStatus')?$('filterStatus').value:'all';
      if(st!=='all') parts.push(STATUS_MAP[st]||st);
      var dt=$('filterDateType')?$('filterDateType').value:'none';
      if(dt!=='none'){
        var label=dt==='start'?'입금예정일':'만기일';
        var df=$('dateFrom')?$('dateFrom').value:'';
        var dtt=$('dateTo')?$('dateTo').value:'';
        if(df||dtt) parts.push(label+' '+(df||'')+'~'+(dtt||''));
      }
      $('filterIndicatorText').textContent='필터 적용 중: '+parts.join(' · ')+' ('+data.length+'/'+list.length+'건)';
      ind.style.display='block';
    } else {
      ind.style.display='none';
    }
  }
}

// ===== 날짜 필터 토글 =====
function toggleDateRange(){
  var dt=$('filterDateType').value;
  $('dateRange').style.display=(dt==='none')?'none':'flex';
}
function shortDate(d){if(!d)return'-';var p=d.split('-');return p.length===3?(p[0].slice(2)+'-'+p[1]+'-'+p[2]):d;}

// ===== 리스트 =====
function renderList(){
  renderDashboard();
  var filtered=getFiltered();
  var showCount = currentPage * PAGE_SIZE;
  var visible = filtered.slice(0, showCount);
  var remaining = filtered.length - visible.length;

  // 데스크톱 리스트
  var el=$('listBody');
  if(!filtered.length){el.innerHTML='<div class="empty-msg">조회된 문의가 없습니다.</div>';}
  else{
    el.innerHTML=visible.map(function(iq,i){
      var st=STATUS_MAP[iq.status]||'대기';var bc=badgeClass(iq.status);
      var startDt=fixDate(iq.startDate)||'-';
      var rateStr=iq.rate?(iq.rate+'%'):'-';
      return '<div class="list-item" onclick="openModal('+iq._idx+')">'
        +'<span class="no">'+(filtered.length-i)+'</span>'
        +'<span style="text-align:center"><span class="badge '+bc+'">'+st+'</span></span>'
        +'<span class="date">'+shortDate(startDt)+'</span>'
        +'<span class="company">'+(iq.applyName||'-')+'</span>'
        +'<span class="issuer">'+(iq.issuerName||'-')+'</span>'
        +'<span class="amount">'+fmt(iq.billAmount)+'</span>'
        +'<span class="rate">'+rateStr+'</span>'
        +'<span class="date">'+shortDate(fixDate(iq.billDue)||'-')+'</span>'
        +'</div>';
    }).join('');
  }

  // 모바일 카드 리스트
  var mEl=$('listMobile');
  if(!mEl) return;
  if(!filtered.length){mEl.innerHTML='<div class="empty-msg">조회된 문의가 없습니다.</div>';}
  else{
    mEl.innerHTML=visible.map(function(iq){
      var st=STATUS_MAP[iq.status]||'대기';var bc=badgeClass(iq.status);
      var startDt2=fixDate(iq.startDate)||'-';
      var rateStr=iq.rate?(iq.rate+'%'):'미입력';
      return '<div class="m-card" onclick="openModal('+iq._idx+')">'
        +'<div class="m-row1">'
          +'<span class="m-companies">'+(iq.applyName||'-')+'<span class="arr">→</span>'+(iq.issuerName||'-')+'</span>'
          +'<span class="badge '+bc+'">'+st+'</span>'
        +'</div>'
        +'<div class="m-row2">'
          +'<span class="m-amount">'+fmt(iq.billAmount)+'원</span>'
          +'<span class="m-rate">'+rateStr+'</span>'
        +'</div>'
        +'<div class="m-dates">'
          +'<span>입금예정 <strong>'+shortDate(startDt2)+'</strong></span>'
          +'<span>만기 <strong>'+shortDate(fixDate(iq.billDue)||'-')+'</strong></span>'
        +'</div>'
        +'</div>';
    }).join('');
  }

  // 더보기 버튼
  var lmWrap=$('loadMoreWrap');
  if(remaining>0){
    lmWrap.style.display='block';
    lmWrap.innerHTML='<button class="load-more-btn" onclick="loadMore()">+ '+remaining+'건 더보기</button>';
  } else {
    lmWrap.style.display='none';
    lmWrap.innerHTML='';
  }
}
function loadMore(){
  currentPage++;
  renderList();
}

// ===== 진행바 =====
function progressHTML(status){
  var steps=['wait','select','input','endorse','endorsed','done'];
  var labels=['조건대기','조건선택','조건입력','배서진행','배서완료','입금완료'];
  if(status==='cancel') return '<div class="progress-bar"><div class="step cancel-s" style="flex:1">취소됨</div></div>';
  var idx=steps.indexOf(status);
  return '<div class="progress-bar">'+steps.map(function(s,i){
    var cls=i<idx?'done-s':i===idx?'active':'';
    return '<div class="step '+cls+'">'+labels[i]+'</div>';
  }).join('')+'</div>';
}

    +'<div class="info-item"><div class="lbl">사업자번호</div><div class="val">'+(iq.applyBiz||'-')+'</div></div>'
    +'<div class="info-item"><div class="lbl">발행사</div><div class="val">'+(iq.issuerName||'-')+'</div></div>'
    +'<div class="info-item"><div class="lbl">사업자번호</div><div class="val">'+(iq.issuerBiz||'-')+'</div></div>'
    +'<div class="info-item"><div class="lbl">어음금액</div><div class="val hl">\u20a9'+fmt(iq.billAmount)+'</div></div>'
    +'<div class="info-item"><div class="lbl">만기일</div><div class="val">'+(fixDate(iq.billDue)||'-')+'</div></div>'
    +'<div class="info-item"><div class="lbl">입금예정일</div><div class="val">'+(fixDate(iq.startDate)||'-')+'</div></div>'

  else if(st==='input'){

  else if(st==='endorse'){

  else if(st==='done'){
    html += discountReadHTML(iq);
    html += splitReadHTML(iq);
    html += applicantInfoHTML(iq);
    if(iq.depositDate){
      html += '<div style="background:linear-gradient(135deg,#e3f2fd,#bbdefb);border-radius:14px;padding:16px;margin-bottom:16px;text-align:center">'
        +'<div style="font-size:0.82rem;color:#666">입금완료일</div>'
        +'<div style="font-size:1.2rem;font-weight:800;color:#1565c0">'+iq.depositDate+'</div></div>';
    }
    html += '<div class="btn-row"><button class="btn btn-secondary" onclick="closeModal()">닫기</button></div>';
  }
  else if(st==='cancel'){
    html += '<div style="text-align:center;padding:20px;color:#c62828;font-size:0.92rem;font-weight:700">이 문의는 취소되었습니다.</div>';
    html += '<div class="btn-row"><button class="btn btn-secondary" onclick="closeModal()">닫기</button></div>';
  }

  $('modalBody').innerHTML=html;
  $('modalOverlay').classList.add('show');
  document.body.style.overflow='hidden';

  // 이벤트 재바인딩
  if(st==='wait'){
    var cb=$('splitCheck');
    if(cb){
      cb.checked = !!iq.splitEndorsement;
      toggleSplitUI();
    }
    // 기존값 복원
    if(iq.rate) {$('aRate').value=iq.rate; calcAdmin();}
    if(iq.splitEndorsement&&iq.splitCount){
      $('splitCountSel').value=iq.splitCount;
      updateSplitFields();
      if(iq.splitAmounts){
        for(var i=0;i<iq.splitCount;i++){
          var el=$('sa'+i);
          if(el&&iq.splitAmounts[i]) el.value=fmt(iq.splitAmounts[i]);
        }
      }
      updateSplitTotal();
    }
  }
}

function closeModal(){
  $('modalOverlay').classList.remove('show');
  document.body.style.overflow='';
  currentIdx=-1;
}

// ===== 할인 조건 입력 HTML (대기 상태) =====
function rateInputHTML(iq){
  return '<div class="rate-section"><h3>할인 조건 입력</h3>'
    +'<div class="rate-row">'
    +'<div class="field"><label>월할인율 (%)</label><input type="number" id="aRate" step="0.01" placeholder="예: 2.50" oninput="calcAdmin()"></div>'
    +'<div class="field"><label>사용일수</label><input type="text" id="aDays" value="'+(iq.usageDays||'')+'" readonly></div>'
    +'</div>'
    +'<div id="aCalcResult" style="display:none"><div class="result-panel">'
    +'<div class="result-row"><span class="result-lbl">어음금액</span><span class="result-val" id="arAmount">-</span></div>'
    +'<div class="result-row"><span class="result-lbl">할인액 (수수료 포함)</span><span class="result-val fee" id="arFee">-</span></div>'
    +'<div class="result-row"><span class="result-lbl">입금액</span><span class="result-val net" id="arNet">-</span></div>'
    +'</div></div></div>';
}

function calcAdmin(){
  if(currentIdx<0) return;
  var iq=list[currentIdx];
  var rate=parseFloat($('aRate').value)||0;
  var days=parseInt(iq.usageDays)||0;
  var amount=iq.billAmount||0;
  if(!rate||!days||!amount){$('aCalcResult').style.display='none';return;}
  var splitCnt = ($('splitCheck')&&$('splitCheck').checked) ? (parseInt($('splitCountSel').value)||1) : 1;
  var fee=calcDiscount(amount,rate,days,splitCnt);
  var net=amount-fee;
  $('arAmount').textContent='\u20a9'+fmt(amount)+'원';
  $('arFee').textContent='\u20a9'+fmt(fee)+'원'+(splitCnt>1?' (분할 추가 '+fmt((splitCnt-1)*1500)+'원 포함)':'');
  $('arNet').textContent='\u20a9'+fmt(net)+'원';
  $('aCalcResult').style.display='block';
}

// ===== 분할배서 입력 HTML =====
function splitInputHTML(iq){
  return '<div class="split-section"><h3>분할배서 조건</h3>'
    +'<label class="split-check"><input type="checkbox" id="splitCheck" onchange="toggleSplitUI()"> 분할배서 적용</label>'
    +'<div id="splitArea" style="display:none">'
    +'<div class="field"><label>매수 선택 (1~5장)</label>'
    +'<select id="splitCountSel" onchange="updateSplitFields();calcAdmin()">'
    +'<option value="1">1장</option><option value="2">2장</option><option value="3" selected>3장</option><option value="4">4장</option><option value="5">5장</option>'
    +'</select></div>'
    +'<div id="splitFields"></div>'
    +'<div class="split-total"><span>합계</span><span id="splitTotalVal">0</span></div>'
    +'</div>'
    +'<div id="noSplitMsg" style="display:none;font-size:0.82rem;color:#888;padding:8px 0">분할배서 안함</div>'
    +'</div>';
}

function toggleSplitUI(){
  var checked=$('splitCheck').checked;
  $('splitArea').style.display=checked?'block':'none';
  $('noSplitMsg').style.display=checked?'none':'block';
  if(checked) updateSplitFields();
  calcAdmin();
}

function updateSplitFields(){
  var cnt=parseInt($('splitCountSel').value)||3;
  var h='';
  for(var i=0;i<cnt;i++){
    h+='<div class="split-row-input"><span class="sn">'+(i+1)+'장</span>'
      +'<input type="text" id="sa'+i+'" placeholder="금액 입력" inputmode="numeric" oninput="fmtSplitAmt(this);updateSplitTotal()"></div>';
  }
  $('splitFields').innerHTML=h;
  updateSplitTotal();
}

function fmtSplitAmt(el){
  var v=el.value.replace(/[^0-9]/g,'');
  if(v.length>0&&v[0]==='0')v=v.replace(/^0+/,'')||'';
  el.value=v?Number(v).toLocaleString('ko-KR'):'';
}

function updateSplitTotal(){
  var cnt=parseInt($('splitCountSel')?$('splitCountSel').value:'0')||0;
  var sum=0;
  for(var i=0;i<cnt;i++){
    var el=$('sa'+i);
    if(el) sum+=parseNum(el.value);
  }
  var amount=(currentIdx>=0&&list[currentIdx])?list[currentIdx].billAmount:0;
  var totalEl=$('splitTotalVal');
  if(totalEl){
    var match=sum===amount;
    totalEl.textContent='\u20a9'+fmt(sum)+(match?' ✓':' (어음금액: \u20a9'+fmt(amount)+')');
    totalEl.className=match?'match':'mismatch';
  }
}

// ===== 관리자 저장 (대기→선택) =====
var pendingUpdateData = null; // 전송 대기 데이터

function doAdminSave(){
  if(currentIdx<0) return;
  var rate=parseFloat($('aRate').value)||0;
  if(!rate){showToast('월할인율을 입력해주세요.','err');return;}

  var iq=list[currentIdx];
  var days=parseInt(iq.usageDays)||0;

  // 분할배서
  var splitOn=$('splitCheck')&&$('splitCheck').checked;
  var splitCount=0,splitAmounts=[];
  if(splitOn) splitCount=parseInt($('splitCountSel').value)||0;

  var fee=calcDiscount(iq.billAmount,rate,days,splitOn?splitCount:1);
  var net=iq.billAmount-fee;

  if(splitOn){
    var sum=0;
    for(var i=0;i<splitCount;i++){
      var el=$('sa'+i);
      var v=el?parseNum(el.value):0;
      splitAmounts.push(v);
      sum+=v;
    }

    // 합계 검증
    if(sum!==iq.billAmount){
      var diff=iq.billAmount-sum;
      $('popBill').textContent='어음금액: \u20a9'+fmt(iq.billAmount)+'원';
      $('popSum').textContent='합계액: \u20a9'+fmt(sum)+'원';
      var sign=diff>0?'+':'-';
      $('popDiff').textContent='차액: '+sign+' \u20a9'+fmt(Math.abs(diff))+'원';
      $('popDiff').className='diff '+(diff>0?'plus':'minus');
      $('popupOverlay').classList.add('show');
      return;
    }
  }

  // 전송 데이터 임시 저장
  pendingUpdateData = {
    rate: rate,
    fee: fee,
    net: net,
    status: 'select',
    processedAt: new Date().toLocaleString('ko-KR'),
    splitEndorsement: !!splitOn,
    splitCount: splitCount,
    splitAmounts: JSON.stringify(splitAmounts),
    _slackText: '[할인 조건 전달] '+iq.issuerName+'\n수취사: '+iq.applyName+'\n어음: \u20a9'+fmt(iq.billAmount)+'원\n할인율: '+rate+'% | 할인액: \u20a9'+fmt(fee)+'원 | 입금액: \u20a9'+fmt(net)+'원'+(splitOn?'\n분할배서: '+splitCount+'장':'')
  };

  // 확인 팝업 내용 생성
  var extraSplit = (splitOn && splitCount > 1) ? (splitCount-1)*1500 : 0;
  var h = '';
  h += '<div class="confirm-row"><span class="cl">수취사</span><span class="cv">'+(iq.applyName||'-')+'</span></div>';
  h += '<div class="confirm-row"><span class="cl">발행사</span><span class="cv">'+(iq.issuerName||'-')+'</span></div>';
  h += '<div class="confirm-row"><span class="cl">어음금액</span><span class="cv">\u20a9'+fmt(iq.billAmount)+'원</span></div>';
  h += '<div class="confirm-row"><span class="cl">만기일</span><span class="cv">'+(fixDate(iq.billDue)||'-')+'</span></div>';
  h += '<div class="confirm-row"><span class="cl">사용일수</span><span class="cv">'+days+'일</span></div>';
  h += '<div class="confirm-row"><span class="cl">월할인율</span><span class="cv">'+rate+'%</span></div>';
  h += '<div class="confirm-row"><span class="cl">할인액 (수수료 포함)</span><span class="cv fee">\u20a9'+fmt(fee)+'원'+(extraSplit>0?' (분할 추가 '+fmt(extraSplit)+'원)':'')+'</span></div>';
  h += '<div class="confirm-row"><span class="cl">입금액</span><span class="cv net">\u20a9'+fmt(net)+'원</span></div>';
  if(splitOn){
    h += '<div class="confirm-split"><div class="confirm-split-title">분할배서 ('+splitCount+'장)</div>';
    for(var i=0;i<splitCount;i++){
      h += '<div class="confirm-split-row"><span>'+(i+1)+'장</span><span style="font-weight:700">\u20a9'+fmt(splitAmounts[i])+'원</span></div>';
    }
    h += '</div>';
  }
  $('confirmBody').innerHTML = h;
  $('btnConfirmSend').disabled = false;
  $('btnConfirmSend').textContent = '전송하기';
  $('confirmOverlay').classList.add('show');
}

function closeConfirm(){
  $('confirmOverlay').classList.remove('show');
  pendingUpdateData = null;
}

function doConfirmSend(){
  if(!pendingUpdateData || currentIdx<0) return;
  var btn = $('btnConfirmSend');
  btn.disabled = true;
  btn.textContent = '전송 중...';

  var iq = list[currentIdx];
  updateBillAPI(iq.uid, pendingUpdateData).then(function(){
    loadAll().then(function(data){
      list = data;
      renderDashboard();
      renderList();
      $('confirmOverlay').classList.remove('show');
      pendingUpdateData = null;
      showToast('저장 완료 — 신청자에게 전달되었습니다.','ok');
      closeModal();
    });
  });
}

function closePopup(){$('popupOverlay').classList.remove('show');}

// ===== 입금완료 (배서완료→입금완료) =====
function doDepositComplete(){
  if(currentIdx<0) return;
  if(!confirm('입금완료 처리하시겠습니까?')) return;
  var btn=event.target; btn.disabled=true; btn.textContent='처리 중...';
  var iq=list[currentIdx];
  var depositDate=new Date().toLocaleDateString('ko-KR');

  var updateData = {
    status: 'done',
    depositDate: depositDate,
    _slackText: '[입금 완료] '+iq.issuerName+'\n수취사: '+iq.applyName+'\n입금액: \u20a9'+fmt(iq.net)+'원\n입금일: '+depositDate
  };

  updateBillAPI(iq.uid, updateData).then(function(){
    // Reload data from API
    loadAll().then(function(data){
      list = data;
      renderDashboard();
      renderList();
      showToast('입금완료 처리되었습니다.','ok');
      closeModal();
    });
  }).catch(function(err){
    btn.disabled=false; btn.textContent='입금완료';
    showToast('처리 실패: '+err,'err');
  });
}

// ===== 읽기전용 할인 정보 =====
function discountReadHTML(iq){
  if(!iq.rate) return '';
  var days=iq.usageDays||0;
  var minNotice=(days<30)?'<div style="margin-top:10px;padding:8px 12px;background:#fff8e1;border:1.5px solid #ffe0b2;border-radius:8px;font-size:0.65rem;color:#e65100;line-height:1.5">[안내] 전자어음 할인시 적용되는 \'사용일수\'는 \'30일 미만\'시에도 최소 \'30일\' 기준으로 계산됩니다.</div>':'';
  return '<div class="rate-section"><h3>할인 조건</h3>'
    +'<div class="result-panel">'
    +'<div class="result-row"><span class="result-lbl">입금액</span><span class="result-val net">\u20a9'+fmt(iq.net)+'원</span></div>'
    +'<div class="result-row"><span class="result-lbl">할인액 (수수료 포함)</span><span class="result-val fee">\u20a9'+fmt(iq.fee)+'원</span></div>'
    +'<div class="result-row"><span class="result-lbl">월할인율</span><span class="result-val">'+iq.rate+'%</span></div>'
    +'<div class="result-row"><span class="result-lbl">사용일수</span><span class="result-val">'+Math.max(days,30)+'일</span></div>'
    +minNotice
    +'</div></div>';
}

// ===== 분할배서 활성 여부 =====
function isSplitActive(iq){
  if(!iq.splitEndorsement || iq.splitEndorsement==='false' || iq.splitEndorsement===0 || iq.splitEndorsement==='0') return false;
  if(!iq.splitCount || parseInt(iq.splitCount)<=1) return false;
  if(!iq.splitAmounts || !Array.isArray(iq.splitAmounts) || iq.splitAmounts.length===0) return false;
  var hasValue = iq.splitAmounts.some(function(v){return parseInt(v)>0;});
  return hasValue;
}

// ===== 읽기전용 분할배서 =====
function splitReadHTML(iq){
  if(!isSplitActive(iq)) return '';
  var h='<div class="split-section" style="border:none"><h3>분할배서 조건 ('+iq.splitCount+'장)</h3>';
  for(var i=0;i<iq.splitCount;i++){
    h+='<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:0.85rem"><span style="color:#888">'+(i+1)+'장</span><span style="font-weight:700">\u20a9'+fmt(iq.splitAmounts[i])+'원</span></div>';
  }
  h+='</div>';
  return h;
}

// ===== 공유 링크 복사 =====
function copyShareLink(url){
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(function(){
      showToast('링크가 복사되었습니다. 카톡 등에 붙여넣기 하세요.','ok');
    });
  } else {
    var t=document.createElement('textarea');
    t.value=url;document.body.appendChild(t);
    t.select();document.execCommand('copy');
    document.body.removeChild(t);
    showToast('링크가 복사되었습니다.','ok');
  }
}

// ===== 파일 공유 (모바일: 카카오톡/슬랙 등 앱 선택, PC: 링크 복사 폴백) =====
function shareFile(fileName, fileUrl){
  if(navigator.share){
    navigator.share({
      title: fileName,
      text: '[전자어음 첨부파일] ' + fileName,
      url: fileUrl
    }).catch(function(){});
  } else {
    copyShareLink(fileUrl);
  }
}

// ===== 신청자 입력정보 읽기 =====
function applicantInfoHTML(iq){
  var bk=iq.bankName||'';var ac=iq.accountNo||'';var fn=iq.attachmentName||'';
  var fData=iq.attachmentData||'';var fType=iq.attachmentType||'';
  if(!bk&&!ac&&!fn) return '';
  var h='<div class="applicant-info"><h3>신청자 입력 정보</h3>'
    +'<div class="ai-row"><span class="ai-lbl">은행명</span><span class="ai-val">'+(bk||'-')+'</span></div>'
    +'<div class="ai-row"><span class="ai-lbl">계좌번호</span><span class="ai-val">'+(ac||'-')+'</span></div>';
  if(fn){
    if(fData){
      h+='<div class="ai-row"><span class="ai-lbl">첨부파일</span><span class="ai-val" style="cursor:pointer;color:#1565c0;text-decoration:underline" onclick="window.open(\''+fData+'\',\'_blank\')">'+fn+'</span></div>';
    } else {
      h+='<div class="ai-row"><span class="ai-lbl">첨부파일</span><span class="ai-val">'+fn+'</span></div>';
    }
    if(fData){
      var isDriveLink=fData.indexOf('drive.google.com')>=0;
      h+='<div style="margin-top:8px;background:#f8f9ff;border:1px solid #e0e0e0;border-radius:10px;padding:12px">';
      if(isDriveLink){
        // 구글 드라이브 링크 방식
        var fileId=fData.match(/\/d\/([^\/]+)/);
        var thumbUrl=fileId?'https://drive.google.com/thumbnail?id='+fileId[1]+'&sz=w400':'';
        var isImage=fn.match(/\.(jpg|jpeg|png|gif)$/i);
        if(isImage&&thumbUrl){
          h+='<img src="'+thumbUrl+'" style="max-width:100%;border-radius:8px;margin-bottom:8px">';
        } else {
          h+='<div style="text-align:center;font-size:2.5rem;padding:12px 0">📄</div>';
        }
        h+='<div style="font-size:0.8rem;color:#666;margin-bottom:8px;word-break:break-all">'+fn+'</div>';
        h+='<div style="display:flex;gap:8px">';
        h+='<a href="'+fData+'" target="_blank" style="flex:1;padding:8px;border-radius:8px;background:#e3f2fd;color:#1565c0;font-size:0.78rem;font-weight:600;text-align:center;text-decoration:none">파일 보기</a>';
        h+='<button onclick="copyShareLink(\''+fData+'\')" style="flex:1;padding:8px;border-radius:8px;background:#e8f5e9;color:#2e7d32;font-size:0.78rem;font-weight:600;text-align:center;border:none;cursor:pointer">링크 복사</button>';
        h+='<button onclick="shareFile(\''+fn.replace(/'/g,"\\'")+'\',\''+fData+'\')" style="flex:1;padding:8px;border-radius:8px;background:#fff3e0;color:#e65100;font-size:0.78rem;font-weight:600;text-align:center;border:none;cursor:pointer">공유</button>';
        h+='</div>';
      } else {
        // 기존 base64 방식 (하위호환)
        var isImg=fType.indexOf('image')>=0;
        if(isImg){
          h+='<img src="'+fData+'" style="max-width:100%;border-radius:8px;margin-bottom:8px">';
        } else {
          h+='<div style="text-align:center;font-size:2.5rem;padding:12px 0">📄</div>';
        }
        h+='<div style="display:flex;gap:8px;margin-top:8px">';
        h+='<a href="'+fData+'" download="'+fn+'" style="flex:1;padding:8px;border-radius:8px;background:#e8f5e9;color:#2e7d32;font-size:0.78rem;font-weight:600;text-align:center;text-decoration:none">다운로드</a>';
        h+='</div>';
      }
      h+='</div>';
    } else {
      // Drive URL 없는 경우 — 폴더 링크로 안내
      h+='<div style="margin-top:8px;display:flex;gap:8px">';
      h+='<a href="https://drive.google.com/drive/folders/1EA4KCxRizzfxyw51iZI5lg2Ih8Tqc8R8" target="_blank" style="flex:1;padding:8px;border-radius:8px;background:#e3f2fd;color:#1565c0;font-size:0.78rem;font-weight:600;text-align:center;text-decoration:none">Drive 폴더 열기</a>';
      h+='<button onclick="shareFile(\''+fn.replace(/'/g,"\\'")+'\',\'https://drive.google.com/drive/folders/1EA4KCxRizzfxyw51iZI5lg2Ih8Tqc8R8\')" style="flex:1;padding:8px;border-radius:8px;background:#fff3e0;color:#e65100;font-size:0.78rem;font-weight:600;text-align:center;border:none;cursor:pointer">공유</button>';
      h+='</div>';
    }
  }
  h+='</div>';
  return h;
}

// ===== 토스트 =====
function showToast(msg,type){
  var el=$('toast');el.textContent=msg;
  el.className='msg-toast msg-'+(type||'ok');
  el.style.display='block';
  setTimeout(function(){el.style.display='none'},3000);
}

// ===== 사용가이드 팝업 =====
function openGuide(){
  var ov=document.getElementById('guideOverlay');
  document.getElementById('guideFrame').src='guide.html';
  ov.style.display='flex';
  document.body.style.overflow='hidden';
}
function closeGuide(){
  var ov=document.getElementById('guideOverlay');
  ov.style.display='none';
  document.getElementById('guideFrame').src='';
  document.body.style.overflow='';
}

// ===== ESC =====
document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeGuide();closePopup();closeModal();}});

$('pinInput').focus();
